name: "Build and deploy Github pages"
on: [push]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # nécessaire pour pousser sur la branche gh-pages

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        # persist-credentials doit rester à true (défaut) pour que
        # JamesIves/github-pages-deploy-action puisse pousser sur gh-pages

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: "Install Python dependencies"
        run: |
          pip3 install uv setuptools
          uv sync --extra docs

      - name: "Build Sphinx Doc"
        run: |
          uv run make html
        working-directory: docs

      - name: "Deploy Github Pages"
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: docs/build/html/
